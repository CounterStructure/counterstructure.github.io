<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counterstructure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Courier New', monospace; 
            background: #0a0a0a; 
            color: #00ff41; 
            min-height: 100vh; 
            overflow-x: hidden;
            line-height: 1.6;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0,255,65,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0,255,65,0.02) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(0,255,65,0.01) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
            animation: ether 8s ease-in-out infinite;
        }
        @keyframes ether {
            0%, 100% { opacity: 0.3; transform: scale(1) rotate(0deg); }
            33% { opacity: 0.6; transform: scale(1.1) rotate(1deg); }
            66% { opacity: 0.4; transform: scale(0.95) rotate(-0.5deg); }
        }
        header { 
            background: rgba(10,10,10,0.95); 
            padding: 100px 40px 80px; 
            text-align: center; 
            border-bottom: 3px solid #00ff41;
            position: relative;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .title-container {
            position: relative;
            display: inline-block;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
        }
        h1 { 
            font-size: 4.2em; 
            font-weight: 900; 
            color: #00d4ff;
            text-shadow: 
                0 0 10px #00d4ff,
                4px 0 0 #000, -4px 0 0 #000,
                0 4px 0 #000, 0 -4px 0 #000;
            letter-spacing: 0.2em;
            position: relative;
            animation: pixelScan 3s ease-in-out infinite;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        h1::before {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            color: transparent;
            background: linear-gradient(90deg, transparent 0%, #00ff41 50%, transparent 100%);
            -webkit-background-clip: text;
            background-clip: text;
            animation: scanGlow 3s ease-in-out infinite reverse;
            z-index: -1;
            filter: blur(1px);
        }
        @keyframes pixelScan {
            0%, 100% { 
                filter: drop-shadow(0 0 20px #00d4ff) contrast(1);
                transform: scale(1);
            }
            25% { 
                filter: drop-shadow(0 0 40px #00d4ff) contrast(1.2) brightness(1.1);
                transform: scale(1.02);
            }
            50% { 
                filter: drop-shadow(0 0 60px #00d4ff) contrast(1.4) brightness(1.3);
                transform: scale(1.01);
            }
            75% { 
                filter: drop-shadow(0 0 40px #00d4ff) contrast(1.2) brightness(1.1);
                transform: scale(1.02);
            }
        }
        @keyframes scanGlow {
            0%, 100% { clip-path: inset(0 100% 0 0); }
            50% { clip-path: inset(0 0 0 0); }
        }
        .tagline { 
            font-size: 1.4em; 
            opacity: 0.85; 
            margin-top: 25px; 
            letter-spacing: 0.08em;
            text-shadow: 0 0 15px #00ff41;
            animation: flicker 6s infinite;
        }
        @keyframes flicker {
            0%, 100%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 0.85; }
            20%, 24%, 55% { opacity: 0.4; }
        }
        section { 
            max-width: 1000px; 
            margin: 80px auto; 
            padding: 0 40px;
        }
        h2 { 
            font-size: 2.2em; 
            margin-bottom: 60px; 
            color: #00ff41; 
            text-shadow: 0 0 20px #00ff41;
            text-align: center;
            position: relative;
        }
        h2::after {
            content: ''; 
            position: absolute; 
            bottom: -10px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 100px; height: 2px; 
            background: #00ff41;
            box-shadow: 0 0 10px #00ff41;
        }
        ul { 
            list-style: none; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
            gap: 35px;
            max-width: 1200px; margin: 0 auto;
        }
        li { 
            background: rgba(26,26,26,0.9); 
            border: 2px solid #00ff41; 
            padding: 40px 30px; 
            border-radius: 12px; 
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            image-rendering: pixelated;
        }
        li::before {
            content: '>'; 
            position: absolute; 
            top: 25px; 
            right: 25px;
            color: #00ff41; 
            font-size: 1.8em; 
            opacity: 0.7;
            font-weight: bold;
        }
        li::after {
            content: ''; 
            position: absolute; 
            top: 0; left: 0; 
            right: 0; bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(0,255,65,0.05) 50%, transparent 100%);
            transform: translateX(-100%); 
            transition: transform 0.6s;
        }
        li:hover { 
            background: rgba(0,30,0,0.95); 
            border-color: #00ff41; 
            box-shadow: 0 20px 60px rgba(0,255,65,0.4);
            transform: translateY(-12px) scale(1.02);
        }
        li:hover::after {
            transform: translateX(100%);
        }
        li a { 
            color: #b0ffb0; 
            text-decoration: none; 
            font-size: 1.25em; 
            display: block;
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
            line-height: 1.5;
        }
        li:hover a { 
            color: #00ff41; 
            text-shadow: 0 0 15px #00ff41;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2.8em; }
            ul { grid-template-columns: 1fr; gap: 25px; }
            li { padding: 30px 25px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="title-container">
            <h1 data-text="Counterstructure">Counterstructure</h1>
        </div>
        <p class="tagline">Microstructure threat intelligence for solo traders</p>
    </header>
    
    <section>
        <h2>Research Areas</h2>
        <ul>
            <li><a href="toxicity.html">Order flow toxicity detection</a></li>
            <li><a href="spoofing.html">Quote stuffing & spoofing patterns</a></li>
            <li><a href="latency.html">Latency arbitrage threat models</a></li>
            <li><a href="fragmentation.html">Fragmentation risk analysis</a></li>
        </ul>
    </section>
</body>
</html>

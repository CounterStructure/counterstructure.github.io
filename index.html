<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counterstructure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Courier New', monospace; 
            background: #0a0a0a; 
            color: #00ff41; 
            min-height: 100vh; 
            overflow-x: hidden;
            line-height: 1.6;
        }
        header { 
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%); 
            padding: 100px 40px 80px; 
            text-align: center; 
            border-bottom: 3px solid #00ff41;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,255,65,0.3);
            overflow: hidden;
        }
        .scan-container {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { 
            font-size: 4em; 
            font-weight: 900; 
            color: #00d4ff;
            letter-spacing: 0.15em;
            position: relative;
            text-shadow: 0 0 30px #00d4ff;
            padding: 20px 0;
        }
        .barcode-scan {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(0,212,255,0.9) 2%, 
                rgba(0,212,255,0.7) 4%, 
                transparent 6%);
            transform: translateX(-100%);
            animation: barcodeScan 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
            mix-blend-mode: screen;
            height: 100%;
            z-index: 2;
        }
        @keyframes barcodeScan {
            0% { transform: translateX(-100%); opacity: 0; }
            5% { opacity: 1; }
            25% { transform: translateX(100%); }
            30%, 100% { transform: translateX(100%); opacity: 0; }
        }
        .scan-lines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                repeating-linear-gradient(90deg, 
                    transparent 0px, 
                    rgba(0,255,65,0.1) 2px, 
                    transparent 4px),
                repeating-linear-gradient(0deg, 
                    transparent 0px, 
                    rgba(0,212,255,0.05) 1px, 
                    transparent 2px);
            animation: scanLines 3s linear infinite;
            pointer-events: none;
        }
        @keyframes scanLines {
            0% { transform: translateX(-20px); }
            100% { transform: translateX(20px); }
        }
        .tagline { 
            font-size: 1.4em; 
            opacity: 0.85; 
            margin-top: 25px; 
            letter-spacing: 0.08em;
            text-shadow: 0 0 15px #00ff41;
            position: relative;
            z-index: 3;
        }
        section { 
            max-width: 1000px; 
            margin: 80px auto; 
            padding: 0 40px;
        }
        h2 { 
            font-size: 2.2em; 
            margin-bottom: 60px; 
            color: #00ff41; 
            text-align: center;
            text-shadow: 0 0 20px #00ff41;
            position: relative;
        }
        h2::after {
            content: ''; 
            position: absolute; 
            bottom: -10px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 100px; height: 2px; 
            background: #00ff41;
            box-shadow: 0 0 10px #00ff41;
        }
        ul { 
            list-style: none; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
            gap: 35px;
            max-width: 1200px; margin: 0 auto;
        }
        li { 
            background: rgba(26,26,26,0.9); 
            border: 2px solid #00ff41; 
            padding: 40px 30px; 
            border-radius: 12px; 
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        li::before {
            content: '>'; 
            position: absolute; 
            top: 25px; 
            right: 25px;
            color: #00ff41; 
            font-size: 1.8em; 
            opacity: 0.7;
            font-weight: bold;
        }
        li::after {
            content: ''; 
            position: absolute; 
            top: 0; left: 0; 
            right: 0; bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(0,255,65,0.05) 50%, transparent 100%);
            transform: translateX(-100%); 
            transition: transform 0.6s;
        }
        li:hover { 
            background: rgba(0,30,0,0.95); 
            border-color: #00ff41; 
            box-shadow: 0 20px 60px rgba(0,255,65,0.4);
            transform: translateY(-12px) scale(1.02);
        }
        li:hover::after {
            transform: translateX(100%);
        }
        li a { 
            color: #b0ffb0; 
            text-decoration: none; 
            font-size: 1.25em; 
            display: block;
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
            line-height: 1.5;
        }
        li:hover a { 
            color: #00ff41; 
            text-shadow: 0 0 15px #00ff41;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2.8em; }
            ul { grid-template-columns: 1fr; gap: 25px; }
            li { padding: 30px 25px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="scan-container">
            <div class="barcode-scan"></div>
            <div class="scan-lines"></div>
            <h1>Counter Structure</h1>
            <p class="tagline">HFT/BOT/ALGO/AI Counter Intellegence</p>
        </div>
    </header>
    
    <section>
        <h2>Research Areas</h2>
        <ul>
            <li><a href="toxicity.html">Core Project</a></li>
            <li><a href="spoofing.html">Quote stuffing & spoofing patterns</a></li>
            <li><a href="latency.html">Latency arbitrage threat models</a></li>
            <li><a href="fragmentation.html">Fragmentation risk analysis</a></li>
        </ul>
    </section>
</body>
</html>
